{% extends 'base.html' %}
{% block title %}Register - YAPA{% endblock %}
{% block content %}
<h2>Create Your YAPA Account</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Register</button>
</form>
<p>
  Already have an account?
  <a href="{% url 'login' %}">Log In</a>
</p>
{% endblock %}
