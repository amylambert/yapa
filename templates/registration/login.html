{% extends 'base.html' %}
{% load static %}

{% block title %}Login - YAPA{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="window-frame">
    <div class="window-titlebar">
      <span class="titlebar-text">YAPA.exe - Sign In</span>
      <div class="titlebar-controls">
        <button type="button" class="control-button minimize">_</button>
        <button type="button" class="control-button">◰</button>
        <button type="button" class="control-button">×</button>
      </div>
    </div>
    <div class="login-body">
      <h2>Sign In to YAPA</h2>
      <form method="post" class="interactive-form">
        {% csrf_token %}
        <p>
          <label for="{{ form.username.id_for_label }}">Username:</label>
          {{ form.username }}
        </p>
        <p>
          <label for="{{ form.password.id_for_label }}">Password:</label>
          {{ form.password }}
        </p>
        <button type="submit" class="submit-button">Log In</button>
      </form>
      <p class="form-footer">
        New here? <a href="{% url 'accounts:register' %}">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
