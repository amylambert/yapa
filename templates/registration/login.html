{% extends 'base.html' %}
{% block title %}Login - YAPA{% endblock %}
{% block content %}
<h2>Sign In to YAPA</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Log In</button>
</form>
<p>
  New here?
  <a href="{% url 'register' %}">Create an account</a>
</p>
{% endblock %}
