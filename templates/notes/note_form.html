{% extends 'base.html' %}

{% block title %}
Create Note - YAPA
{% endblock %}

{% block content %}
<h2>Compose New Note</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Note</button>
</form>

<p>
    <a href="{% url 'workspace-detail' view.kwargs.workspace_id %}">
        Cancel and Go Back
    </a>
</p>
{% endblock %}
